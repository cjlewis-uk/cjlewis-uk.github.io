<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Christopher Lewis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #222;
      background: #fff;
    }

    /* Hero section */
    .hero {
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("images/CJL.jpg") center / cover no-repeat;
      color: #fff;
      padding: 1.5rem 2rem 3.5rem;
    }

    .hero h1 {
      margin: 2.5rem 0 0.25rem;
      font-size: 2.4rem;
      font-weight: 600;
    }

    .hero p {
      margin: 0;
      max-width: 40rem;
      font-size: 1.05rem;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      padding-bottom: 0.15rem;
    }

    nav a:hover {
      border-bottom-color: rgba(255,255,255,0.8);
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 2.5rem 2rem;
    }

    section {
      margin-bottom: 2.5rem;
    }

    footer {
      border-top: 1px solid #ddd;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <nav>
      Allotment</a>
      Gadgets</a>
      Electronics</a>
      Photos</a>
    </nav>

    <h1>Christopher Lewis</h1>
    <p>Personal notes on allotment gardening, gadgets, electronics, and a few photos.</p>
  </header>

  <main>
    <section>
      <h2>Welcome</h2>
      <p>Notes, projects, photos, and experiments — just for fun.</p>
    </section>
  </main>

  <footer>
    <p>© Christopher Lewis</p>
  </footer>

</body>
</html>
